services:
  postgres:
    image: postgres:18-alpine
    container_name: mypgdb
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: myfirstapp
      TZ: Asia/Taipei
    ports:
      - "15432:5432"
    volumes:
      # ⚠️ bind mount（WSL ext4）
      - ./data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d myfirstapp"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
