services:
  oradb_26ai_free:
    # gvenzl/oracle-free（建議 pin 版本，不要用 latest）
    image: gvenzl/oracle-free:23.26.1-slim
    container_name: oradb_26ai_free
    env_file:
      - .env
    ports:
      - "${ORACLE_PORT}:1521"
    environment:
      # 第一次初始化必填：SYS/SYSTEM 密碼
      ORACLE_PASSWORD: ${ORACLE_PASSWORD}
      # 可選：建立一個 app schema user
      APP_USER: ${APP_USER:-}
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-}
      # 可選：額外建立 PDB（不設就用既有 FREEPDB1，啟動更快）
      # ORACLE_DATABASE: ${ORACLE_DATABASE:-}
    volumes:
      - oracle-data:/opt/oracle/oradata
      # 初始化腳本（只會在「第一次初始化 DB」時跑）
      - ./oracle-init:/container-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

volumes:
  oracle-data:
    external: true
    name: oracledb_oracle-data
