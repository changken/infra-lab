apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    # TODO: 確認最新版本 → https://artifacthub.io/packages/helm/prometheus-community/kube-prometheus-stack
    targetRevision: "70.3.0"
    helm:
      valuesObject:
        # ── Grafana ──────────────────────────────────────────────
        grafana:
          # 密碼從 K8s Secret 讀取，不寫進 Git
          # 部署前先執行：
          #   kubectl create secret generic grafana-admin \
          #     --from-literal=admin-user=admin \
          #     --from-literal=admin-password=<你的密碼> \
          #     -n monitoring
          admin:
            existingSecret: grafana-admin
            userKey: admin-user
            passwordKey: admin-password
          ingress:
            enabled: true
            ingressClassName: alb
            annotations:
              alb.ingress.kubernetes.io/scheme: internet-facing
              alb.ingress.kubernetes.io/target-type: ip
              alb.ingress.kubernetes.io/group.name: eks-monitoring
            hosts:
              - ""
            path: /
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          # 預載 Kubernetes / Prometheus / Node Exporter 官方 dashboard
          defaultDashboardsEnabled: true
          sidecar:
            dashboards:
              enabled: true
              searchNamespace: ALL

        # ── Prometheus ───────────────────────────────────────────
        prometheus:
          prometheusSpec:
            retention: 24h
            # Lab: 不建立 PVC，省掉 EBS 費用
            # TODO: 若要持久化，改成 storageSpec: { volumeClaimTemplate: { ... } }
            storageSpec: {}
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi
            # 讓 Prometheus 抓取所有 namespace 的 ServiceMonitor
            serviceMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            podMonitorSelectorNilUsesHelmValues: false
            podMonitorSelector: {}
            podMonitorNamespaceSelector: {}

        # ── AlertManager ─────────────────────────────────────────
        # Lab: 關閉 AlertManager，省資源
        # TODO: 若要練 Alerting，改成 enabled: true 並設定 routes / receivers
        alertmanager:
          enabled: false

        # ── Node Exporter (節點 CPU/Memory/Disk 指標) ─────────────
        nodeExporter:
          enabled: true

        # ── kube-state-metrics (Pod / Deployment / HPA 狀態指標) ──
        kubeStateMetrics:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
