apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  conditions:
    # 限制只有 custom-app namespace 的 ExternalSecret 可以引用此 store
    # 新增 namespace 時需明確在此列出
    - namespaces:
        - custom-app
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # ESO controller 的 SA 已有 IRSA annotation，此處不需額外 auth 設定
